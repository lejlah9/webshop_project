version: '3.8'

services:

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=webshop
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"

  cache:
    image: redis:alpine

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      
    depends_on:
      - cache

  mq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"